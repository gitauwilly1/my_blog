<!-- templates/subscribe.html -->

{% extends 'base.html' %}

{% block content %}
  <div class="mx-auto max-w-2xl">
  <div class="mb-8 max-w-xl">
    <p class="mb-3 inline-flex rounded-full border border-amber-400/30 bg-amber-400/10 px-4 py-1 text-sm font-medium text-amber-200">Newsletter</p>
    <h2 class="text-4xl font-bold tracking-tight text-white sm:text-5xl">Subscribe to our newsletter</h2>
    <p class="mt-4 text-base leading-7 text-slate-300">Get occasional updates from the blog without checking back every day.</p>
  </div>

  {% if messages %}
    <div class="mb-6 space-y-3">
    {% for message in messages %}
      <div class="rounded-2xl border border-blue-400/30 bg-blue-500/10 px-4 py-3 text-blue-100" role="alert">
      <span class="block sm:inline">{{ message }}</span>
      </div>
    {% endfor %}
    </div>
  {% endif %}

  <form method="post" action="{% url 'subscribe' %}" class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-slate-950/30 backdrop-blur sm:p-8">
    {% csrf_token %}
    <div class="space-y-2">
    <label for="email" class="block text-sm font-medium text-slate-200">Email address</label>
    <input type="email" id="email" name="email" required
         class="mt-1 block w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 shadow-sm transition placeholder:text-slate-400 focus:border-amber-500 focus:outline-none focus:ring-4 focus:ring-amber-500/20">
    </div>

    <button type="submit" class="mt-5 inline-flex w-full items-center justify-center rounded-full bg-amber-400 px-6 py-3 font-semibold text-slate-950 transition hover:bg-amber-300 focus:outline-none focus:ring-4 focus:ring-amber-500/30">
    Subscribe
    </button>
  </form>
  </div>
{% endblock %}
