{% extends 'base.html' %}
{% block title %}Verify 2FA{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100 p-4">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-2xl">
        <h2 class="text-2xl font-bold text-center mb-6">Enter Verification Code</h2>
        
        <div class="text-gray-600 text-center mb-6">
            Enter the 6-digit code from your authenticator app.
        </div>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <input 
                    type="text" 
                    name="code" 
                    maxlength="6"
                    pattern="[0-9]{6}"
                    class="w-full px-3 py-3 border border-gray-300 rounded-md text-center text-4xl tracking-widest font-mono"
                    placeholder="000000"
                    required
                    autofocus
                >
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                Verify
            </button>
        </form>
    </div>
</div>
{% endblock %}
