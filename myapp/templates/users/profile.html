{% extends 'base.html' %}
{% block title %}Profile{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h2 class="text-3xl font-bold mb-6">My Profile</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <div class="text-gray-900">{{ user.email }}</div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">First Name</label>
                <div class="text-gray-900">{{ user.first_name|default:"Not set" }}</div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Last Name</label>
                <div class="text-gray-900">{{ user.last_name|default:"Not set" }}</div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Member Since</label>
                <div class="text-gray-900">{{ user.date_joined|date:"F j, Y" }}</div>
            </div>
        </div>
        
        <div class="mt-8 space-x-4">
            <a href="{% url 'index' %}" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                Back to Home
            </a>
            <form action="{% url 'logout' %}" method="post" class="inline">
                {% csrf_token %}
                <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">
                    Logout
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
